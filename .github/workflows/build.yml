name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: Build with Gradle
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-log.txt
        echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

    - name: Show error summary (if build failed)
      if: env.EXIT_CODE != '0'
      run: |
        echo "=== BUILD ERRORS ==="
        grep -i "error" build-log.txt | head -30 || echo "No error lines found"
        echo "=== FAILURE SUMMARY ==="
        grep -A 10 "FAILURE\|What went wrong" build-log.txt | head -30 || echo "No failure summary"

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build-log.txt
        retention-days: 7

    - name: Upload APK (if build succeeded)
      if: env.EXIT_CODE == '0'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Fail if build failed
      if: env.EXIT_CODE != '0'
      run: exit 1
